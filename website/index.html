<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DurexClient</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
html,body{background:#050508;color:#f1f5f9;font-family:'Space Grotesk',sans-serif;margin:0;padding:0;overflow:hidden;height:100vh}
*{box-sizing:border-box}

/* LOADER */
#loader{position:fixed;inset:0;z-index:9999;background:#000;cursor:default}
#lc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
#linner{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none}
#ltext{font-size:clamp(3rem,9vw,6rem);font-weight:700;color:#fff;letter-spacing:6px;min-height:1.2em;font-family:'Cinzel',serif;margin-bottom:2rem;text-shadow:0 0 40px #e11d48,0 0 80px #9f1239,0 0 160px rgba(225,29,72,0.4);transform-origin:center;will-change:transform,opacity}
#lbar-wrap{width:300px;height:2px;background:rgba(255,255,255,0.08);margin:0 auto 1rem;overflow:hidden}
#lbar{height:100%;width:0%;background:linear-gradient(90deg,#9f1239,#e11d48,#fb7185);box-shadow:0 0 12px #e11d48;transition:width 0.05s linear}
#lstatus{color:#64748b;font-size:0.75rem;letter-spacing:3px;font-family:'Space Mono',monospace}
#lclick{opacity:0;margin-top:3rem;transition:opacity 1.2s ease;pointer-events:none}
#lclick.show{opacity:1;pointer-events:all;cursor:pointer}
#lclick-text{font-size:0.85rem;letter-spacing:6px;color:#e11d48;font-family:'Space Mono',monospace;text-transform:uppercase;animation:cBlink 1.4s ease-in-out infinite}
#lclick-hint{font-size:0.6rem;letter-spacing:3px;color:#475569;font-family:'Space Mono',monospace;margin-top:0.8rem;animation:cBlink 2s ease-in-out infinite 0.5s}
#loader.out{opacity:0;transition:opacity 0.8s ease;pointer-events:none}
@keyframes cBlink{0%,100%{opacity:1}50%{opacity:0.2}}

/* BG */
#shader,#pcanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(5,5,8,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(225,29,72,0.1);padding:0 2.5rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.2rem;font-weight:700;letter-spacing:4px;color:#e11d48;font-family:'Space Mono',monospace;text-shadow:0 0 20px rgba(225,29,72,0.5)}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{color:#64748b;text-decoration:none;font-size:0.78rem;letter-spacing:2px;font-weight:500;transition:color 0.2s;text-transform:uppercase}
.nav-links a:hover{color:#fb7185}
.nav-right{display:flex;align-items:center;gap:0.8rem}
.lang-btn{background:transparent;border:1px solid #1e1e2e;color:#64748b;padding:0.2rem 0.55rem;font-size:0.7rem;cursor:pointer;transition:all 0.2s;font-weight:600;letter-spacing:1px;font-family:'Space Grotesk',sans-serif}
.lang-btn.active,.lang-btn:hover{border-color:#e11d48;color:#e11d48}
.nav-cta{background:#e11d48;color:#fff;border:none;padding:0.4rem 1rem;font-size:0.75rem;cursor:pointer;text-decoration:none;transition:all 0.2s;font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:1px}
.nav-cta:hover{background:#9f1239;box-shadow:0 0 20px rgba(225,29,72,0.4)}

/* HERO */
.hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 2rem;position:relative;z-index:1}
.hero-eyebrow{font-size:0.68rem;letter-spacing:4px;color:#e11d48;font-weight:500;margin-bottom:1.5rem;opacity:0;animation:fadeUp 0.5s ease 0.2s both;font-family:'Space Mono',monospace}
.hero h1{font-size:clamp(2.2rem,5.5vw,4.5rem);font-weight:700;line-height:1.1;margin-bottom:1.2rem;letter-spacing:-1px;opacity:0;animation:fadeUp 0.6s ease 0.3s both}
#typing-span{color:#fb7185;border-right:2px solid #e11d48;padding-right:2px;animation:cur 0.8s infinite}
@keyframes cur{0%,100%{border-color:#e11d48}50%{border-color:transparent}}
.hero-sub{font-size:0.9rem;color:#64748b;max-width:420px;line-height:1.8;margin-bottom:2.5rem;opacity:0;animation:fadeUp 0.6s ease 0.5s both;font-weight:400}
.hero-btns{display:flex;gap:0.8rem;flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeUp 0.6s ease 0.7s both}
.btn-primary{background:#e11d48;color:#fff;border:none;padding:0.8rem 2rem;font-size:0.82rem;font-weight:600;cursor:pointer;text-decoration:none;letter-spacing:1.5px;transition:all 0.2s;font-family:'Space Grotesk',sans-serif;animation:pulse 3s ease-in-out infinite}
.btn-primary:hover{background:#9f1239;transform:translateY(-1px);box-shadow:0 6px 25px rgba(225,29,72,0.4)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(225,29,72,0)}50%{box-shadow:0 0 25px rgba(225,29,72,0.4)}}
.btn-ghost{background:transparent;color:#94a3b8;border:1px solid rgba(255,255,255,0.08);padding:0.8rem 2rem;font-size:0.82rem;cursor:pointer;text-decoration:none;transition:all 0.2s;font-family:'Space Grotesk',sans-serif;font-weight:500}
.btn-ghost:hover{border-color:rgba(225,29,72,0.4);color:#f1f5f9}
.stats{display:flex;gap:3.5rem;justify-content:center;flex-wrap:wrap;margin-top:3rem;padding-top:2.5rem;border-top:1px solid rgba(255,255,255,0.05);opacity:0;animation:fadeUp 0.6s ease 0.9s both}
.stat{text-align:center}
.stat-n{font-size:1.8rem;font-weight:700;color:#e11d48;font-family:'Space Mono',monospace;line-height:1}
.stat-l{font-size:0.65rem;color:#475569;margin-top:0.4rem;letter-spacing:2.5px;text-transform:uppercase}
.dl-counter{display:flex;align-items:center;gap:0.5rem;margin-top:1.5rem;opacity:0;animation:fadeUp 0.6s ease 1.1s both}
.dl-counter-num{font-size:1.1rem;font-weight:700;color:#fb7185;font-family:'Space Mono',monospace}
.dl-counter-label{font-size:0.7rem;color:#475569;letter-spacing:2px;text-transform:uppercase}
.dl-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:blink 2s infinite;box-shadow:0 0 6px #22c55e}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes reveal{from{opacity:0}to{opacity:1}}
body.revealed{animation:reveal 0.3s ease forwards}
</style>
</head>
<body>

<div id="loader">
  <canvas id="lc"></canvas>
  <div id="linner">
    <div id="ltext"></div>
    <div id="lbar-wrap"><div id="lbar"></div></div>
    <div id="lstatus">Loading</div>
    <div id="lclick">
      <div id="lclick-text">— click anywhere to reveal —</div>
      <div id="lclick-hint">[ tap or click anywhere ]</div>
    </div>
  </div>
</div>

<canvas id="shader"></canvas>
<canvas id="pcanvas"></canvas>

<nav>
  <div class="logo">𝔇𝔲𝔯𝔢𝔵 𝔠𝔩𝔦𝔢𝔫𝔱</div>
  <ul class="nav-links">
    <li><a href="https://discord.gg/BXX3Z3NGgK" target="_blank" id="nl-dc">DISCORD</a></li>
    <li><a href="download.html" id="nl-dl">DOWNLOAD</a></li>
  </ul>
  <div class="nav-right">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('pl')">PL</button>
    <a href="download.html" class="nav-cta" id="nav-cta">DOWNLOAD</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-eyebrow" id="eyebrow">FREE · FABRIC · 1.20 — 1.21</div>
  <h1><span id="typing-span"></span></h1>
  <p class="hero-sub" id="hero-sub">Free Minecraft client for Polish players. Built for anarchi.gg and Podziem. No subscriptions, no fees.</p>
  <div class="hero-btns">
    <a href="download.html" class="btn-primary" id="btn-dl">DOWNLOAD FREE</a>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="dl-count">0</div><div class="stat-l" id="st-dl">Downloads</div></div>
  </div>
  <div class="dl-counter">
    <div class="dl-dot"></div>
    <div class="dl-counter-num" id="dl-live">0</div>
    <div class="dl-counter-label" id="dl-label">total downloads</div>
  </div>
</div>

<script>
const lel=document.getElementById('loader');
const ltext=document.getElementById('ltext');
const lbar=document.getElementById('lbar');
const lstatus=document.getElementById('lstatus');
const lclick=document.getElementById('lclick');
const TARGET='𝔇𝔲𝔯𝔢𝔵 𝔠𝔩𝔦𝔢𝔫𝔱';
const SCR='クケコサシスセソ';
const W=window.innerWidth,H=window.innerHeight;
const lc=document.getElementById('lc');
lc.width=W;lc.height=H;
const ctx=lc.getContext('2d');
let phase='load';
let revIdx=0,lastRevT=0,statusDots=0,lastStatT=0;
let implodeT=0,flashA=0,prevTS=0;
const FS=14,COLS=Math.floor(W/FS);
const drops=new Float32Array(COLS);
for(let i=0;i<COLS;i++) drops[i]=(Math.random()*(-H/FS))|0;
const N=1500;
const px=new Float32Array(N),py=new Float32Array(N);
const pvx=new Float32Array(N),pvy=new Float32Array(N);
const psize=new Float32Array(N),pphase=new Float32Array(N),ptw=new Float32Array(N);
const pcol=new Uint8Array(N),pspin=new Int8Array(N),pspeed=new Float32Array(N);
const COLORS=['#9f1239','#e11d48','#fb7185','#fda4af','#ffffff'];
for(let i=0;i<N;i++){
  px[i]=Math.random()*W; py[i]=Math.random()*H;
  pvx[i]=(Math.random()-0.5)*0.15; pvy[i]=-(Math.random()*0.4+0.04);
  const t=Math.random();
  psize[i]=t>0.96?Math.random()*3+1.5:t>0.85?Math.random()*1.5+0.5:Math.random()*0.8+0.1;
  pphase[i]=Math.random()*Math.PI*2; ptw[i]=Math.random()*0.03+0.005;
  pcol[i]=t>0.88?4:t>0.68?3:t>0.45?2:t>0.22?1:0;
  pspin[i]=Math.random()>0.5?1:-1;
  pspeed[i]=Math.random()*0.7+0.3;
}
function mainLoop(ts){
  if(!prevTS){prevTS=ts;requestAnimationFrame(mainLoop);return;}
  const dt=Math.min((ts-prevTS)/16.67,2);
  prevTS=ts;
  ctx.fillStyle='rgba(0,0,0,0.13)';
  ctx.fillRect(0,0,W,H);
  ctx.font=FS+'px monospace';
  for(let i=0;i<COLS;i++){
    const r=Math.random();
    ctx.fillStyle=r>0.92?'#ff6b8a':r>0.6?'#e11d48':'#7f0d26';
    ctx.fillText(SCR[Math.random()*SCR.length|0],i*FS,drops[i]*FS);
    if(drops[i]*FS>H&&Math.random()>0.97)drops[i]=0;
    drops[i]+=dt*0.35;
  }
  if(phase==='load'||phase==='wait'){
    for(let i=0;i<N;i++){
      pphase[i]+=ptw[i]*dt;
      px[i]+=pvx[i]*dt; py[i]+=pvy[i]*dt;
      if(py[i]<-12){py[i]=H+12;px[i]=Math.random()*W;}
      if(px[i]<0)px[i]=W; if(px[i]>W)px[i]=0;
      const a=0.12+Math.abs(Math.sin(pphase[i]))*0.7;
      ctx.globalAlpha=a;
      ctx.fillStyle=COLORS[pcol[i]];
      ctx.beginPath();ctx.arc(px[i],py[i],psize[i],0,6.2832);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  if(phase==='implode'){
    implodeT+=16.67*dt;
    const prog=Math.min(implodeT/800,1);
    ctx.fillStyle=`rgba(0,0,0,${prog*0.45})`;
    ctx.fillRect(0,0,W,H);
    for(let i=0;i<N;i++){
      const dx=W/2-px[i],dy=H/2-py[i];
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const pull=(0.2+prog*1.0)*pspeed[i]*dt*(1+Math.max(0,1-dist/120)*5);
      pvx[i]+=(dx/dist)*pull+(-dy/dist)*pull*0.35*pspin[i];
      pvy[i]+=(dy/dist)*pull+(dx/dist)*pull*0.35*pspin[i];
      pvx[i]*=0.89;pvy[i]*=0.89;
      px[i]+=pvx[i]*dt;py[i]+=pvy[i]*dt;
      const bright=Math.max(0,1-dist/250);
      const sz=psize[i]*(1+bright*1.5);
      const rr=225+bright*30|0,gg=29+bright*226|0,bb=72+bright*183|0;
      ctx.globalAlpha=0.15+bright*0.85;
      ctx.fillStyle=`rgb(${rr},${gg},${bb})`;
      ctx.beginPath();ctx.arc(px[i],py[i],sz,0,6.2832);ctx.fill();
    }
    ctx.globalAlpha=1;
    ltext.style.opacity=Math.max(0,1-prog*2)+'';
    ltext.style.transform=`scale(${Math.max(0.01,1-prog)})`;
    if(prog>=1){phase='flash';flashA=1;ltext.style.display='none';}
  }
  if(phase==='flash'){
    flashA=Math.max(0,flashA-0.055*dt);
    ctx.fillStyle=`rgba(255,255,255,${flashA})`;
    ctx.fillRect(0,0,W,H);
    if(flashA<=0){
      for(let i=0;i<N;i++){
        px[i]=W/2+(Math.random()-0.5)*8;
        py[i]=H/2+(Math.random()-0.5)*8;
        const a=Math.random()*Math.PI*2;
        const spd=Math.random()*15+4;
        pvx[i]=Math.cos(a)*spd;
        pvy[i]=Math.sin(a)*spd;
      }
      lel.style.display='none';
      document.body.classList.add('revealed');
      startPage();      return;
    }
  }
  requestAnimationFrame(mainLoop);
}
requestAnimationFrame(mainLoop);
(function textLoop(now){
  if(phase!=='load')return;
  if(!now){requestAnimationFrame(textLoop);return;}
  if(now-lastRevT>65){lastRevT=now;revIdx++;lbar.style.width=(revIdx/TARGET.length*100)+'%';}
  if(now-lastStatT>280){lastStatT=now;statusDots=(statusDots+1)%4;lstatus.textContent='Loading'+'.'.repeat(statusDots);}
  let d='';
  for(let i=0;i<revIdx;i++)d+=TARGET[i];
  if(revIdx<TARGET.length)d+=SCR[Math.random()*SCR.length|0];
  for(let i=revIdx+1;i<TARGET.length;i++)d+=SCR[Math.random()*SCR.length|0];
  ltext.textContent=d;
  if(revIdx>=TARGET.length){
    ltext.textContent=TARGET;lbar.style.width='100%';lstatus.textContent='Ready';
    setTimeout(()=>{
      lstatus.style.display='none';
      document.getElementById('lbar-wrap').style.display='none';
      phase='wait';lclick.classList.add('show');
      function doReveal(){
        lel.removeEventListener('click',doReveal);
        lel.removeEventListener('touchstart',doReveal);
        lclick.style.opacity='0';lclick.style.pointerEvents='none';
        phase='implode';implodeT=0;
      }
      lel.addEventListener('click',doReveal);
      lel.addEventListener('touchstart',doReveal,{passive:true});
    },800);
    return;
  }
  requestAnimationFrame(textLoop);
})(0);
let currentLang='en';
function startPage(){
  const sc=document.getElementById('shader'),sx=sc.getContext('2d');
  sc.width=W;sc.height=H;
  let st=0;
  (function ds(){
    st+=0.004;sx.clearRect(0,0,W,H);
    [{x:W*0.15+Math.sin(st)*120,y:H*0.3+Math.cos(st*0.7)*80,r:450,c:'rgba(225,29,72,0.09)'},
     {x:W*0.85+Math.cos(st*0.9)*100,y:H*0.5+Math.sin(st)*70,r:400,c:'rgba(225,29,72,0.07)'},
     {x:W*0.5+Math.sin(st*1.2)*70,y:H*0.85+Math.cos(st*0.6)*50,r:350,c:'rgba(251,113,133,0.05)'},
     {x:W*0.3+Math.cos(st*0.5)*90,y:H*0.6+Math.sin(st)*60,r:280,c:'rgba(159,18,57,0.05)'}
    ].forEach(s=>{
      const g=sx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r);
      g.addColorStop(0,s.c);g.addColorStop(1,'transparent');
      sx.fillStyle=g;sx.fillRect(0,0,W,H);
    });
    sx.fillStyle='rgba(225,29,72,0.008)';
    for(let y=0;y<H;y+=4)sx.fillRect(0,y,W,1);
    requestAnimationFrame(ds);
  })();
  // CURTAIN — czarna kurtyna opada w dół, odsłania stronę od góry
  const curtain=document.createElement('div');
  Object.assign(curtain.style,{
    position:'fixed',inset:'0',zIndex:'499',pointerEvents:'none',
    background:'linear-gradient(to bottom, #000 0%, #0a0005 100%)',
    transformOrigin:'top center',
    transform:'translateY(0)',
    transition:'transform 0.9s cubic-bezier(0.76,0,0.24,1)'
  });
  document.body.appendChild(curtain);
  // czerwona linia na dole kurtyny
  const curtainLine=document.createElement('div');
  Object.assign(curtainLine.style,{
    position:'absolute',bottom:'0',left:'0',right:'0',
    height:'2px',
    background:'linear-gradient(90deg,transparent,#e11d48,#fb7185,#e11d48,transparent)',
    boxShadow:'0 0 20px #e11d48, 0 0 40px rgba(225,29,72,0.5)'
  });
  curtain.appendChild(curtainLine);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    curtain.style.transform='translateY(-100%)';
  }));
  setTimeout(()=>curtain.remove(),1000);

  // cząsteczki — losowe pozycje po całym ekranie, normalny ruch
  const pc=document.getElementById('pcanvas');pc.width=W;pc.height=H;
  const pcx=pc.getContext('2d');
  const pts=[];
  for(let i=0;i<N;i++){
    // losowa pozycja po ekranie
    const rx=Math.random()*W, ry=Math.random()*H;
    pts.push({
      x:rx, y:ry,
      vx:(Math.random()-0.5)*0.12,
      vy:-(Math.random()*0.3+0.03),
      size:psize[i], p:pphase[i], tw:ptw[i],
      c:COLORS[pcol[i]]
    });
  }
  (function dp(){
    pcx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.p+=p.tw;
      p.x+=p.vx; p.y+=p.vy;
      if(p.y<-12){p.y=H+12;p.x=Math.random()*W;}
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      const a=0.1+Math.abs(Math.sin(p.p))*0.7;
      pcx.globalAlpha=a;
      pcx.fillStyle=p.c;
      pcx.beginPath();pcx.arc(p.x,p.y,p.size,0,6.2832);pcx.fill();
    });
    pcx.globalAlpha=1;
    requestAnimationFrame(dp);
  })();
  const tel=document.getElementById('typing-span');
  const wPL=['Najlepszy Darmowy Klient','Najlepszy Klient Wizualny','Najlepszy dla anarchi.gg','Najlepszy dla Podziem'];
  const wEN=['Best Free Client','Best Visual Client','Best for anarchia.gg','Best for Underground'];
  let wi=0,ci=0,del=false;
  function gw(){return currentLang==='pl'?wPL:wEN;}
  function type(){const w=gw()[wi%gw().length];if(!del){tel.textContent=w.substring(0,++ci);if(ci===w.length){del=true;setTimeout(type,1800);return;}}else{tel.textContent=w.substring(0,--ci);if(ci===0){del=false;wi=(wi+1)%gw().length;}}setTimeout(type,del?55:90);}
  setTimeout(type,300);
  const BASE=1200;let dlCount=parseInt(localStorage.getItem('durex_dl')||BASE);dlCount+=1;localStorage.setItem('durex_dl',dlCount);
  const dlEl=document.getElementById('dl-count');const dlLive=document.getElementById('dl-live');
  let cur=0;const iv=setInterval(()=>{cur=Math.min(cur+Math.ceil(dlCount/50),dlCount);const fmt=cur.toLocaleString();dlEl.textContent=fmt;dlLive.textContent=fmt;if(cur>=dlCount)clearInterval(iv);},25);
  setInterval(()=>{dlCount+=Math.floor(Math.random()*3)+1;localStorage.setItem('durex_dl',dlCount);const fmt=dlCount.toLocaleString();dlEl.textContent=fmt;dlLive.textContent=fmt;},5000);
}
const T={en:{eyebrow:'FREE · FABRIC · 1.20 — 1.21',sub:'Free Minecraft client for Polish players. Built for anarchia.gg and Underground. No subscriptions, no fees.',dlBtn:'DOWNLOAD FREE',modsBtn:'VIEW MODULES',stDl:'Downloads',dlLabel:'total downloads',nlMods:'MODULES',nlDl:'DOWNLOAD',navCta:'DOWNLOAD'},pl:{eyebrow:'DARMOWY · FABRIC · 1.20 — 1.21',sub:'Darmowy klient Minecraft dla polskich graczy. Stworzony pod anarchi.gg i Podziem. Zero opłat.',dlBtn:'POBIERZ ZA DARMO',modsBtn:'MODUŁY',stDl:'Pobrań',dlLabel:'łączne pobrania',nlMods:'MODUŁY',nlDl:'POBIERZ',navCta:'POBIERZ'}};
function setLang(l){currentLang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));const t=T[l];const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};s('eyebrow',t.eyebrow);s('hero-sub',t.sub);s('btn-dl',t.dlBtn);s('btn-mods',t.modsBtn);s('st-dl',t.stDl);s('dl-label',t.dlLabel);s('nl-mods',t.nlMods);s('nl-dl',t.nlDl);s('nav-cta',t.navCta);}

</script>
</body>
</html>
