# Skidfuscator Community Edition - config
# https://github.com/skidfuscatordev/skidfuscator-java-obfuscator

# Transformery
transformers:
  # Szyfrowanie stringów w runtime (najważniejsze)
  StringEncryptionTransformer:
    enabled: true

  # Obfuskacja flow (fałszywe skoki, opaque predicates)
  FlowTransformer:
    enabled: true

  # Szyfrowanie liczb
  NumberMutationTransformer:
    enabled: true

  # Ukrywanie wywołań metod przez MethodHandle
  MethodCallHideTransformer:
    enabled: true

  # Fałszywe wyjątki w flow
  FakeExceptionTransformer:
    enabled: true

  # Inicjalizacja pól przez bogus
  FieldInitTransformer:
    enabled: true

# Wyklucz to co musi mieć oryginalne nazwy
exempt:
  - "pl/durex/client/DurexClient"
  - "pl/durex/client/mixin/**"
  - "net/minecraft/**"
  - "net/fabricmc/**"
  - "icyllis/modernui/**"
  - "com/mojang/**"
